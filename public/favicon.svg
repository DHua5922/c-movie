<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">CMovie favicon</title>
  <desc id="desc">A CMovie favicon: a red film-reel C with a play icon, based on the CMovie logo.</desc>

  <!-- Main C mark -->
  <path d="M49.25 12.9C44.85 8.35 38.75 5.5 32 5.5C17.36 5.5 5.5 17.36 5.5 32C5.5 46.64 17.36 58.5 32 58.5C38.75 58.5 44.85 55.65 49.25 51.1" stroke="#E50914" stroke-width="13" stroke-linecap="butt"/>

  <!-- Lower cinema sweep from the original logo -->
  <path d="M13.2 48.1C19.2 57.2 32.4 60.15 43.3 55.35C35.45 62.8 20.4 62.45 11.7 51.1C10.95 50.1 11.95 47.75 13.2 48.1Z" fill="#E50914"/>

  <!-- Play symbol -->
  <path d="M26.2 22.9C26.2 21.7 27.55 20.95 28.6 21.6L43.3 30.7C44.3 31.32 44.3 32.68 43.3 33.3L28.6 42.4C27.55 43.05 26.2 42.3 26.2 41.1V22.9Z" fill="#E50914"/>

  <!-- Film perforations -->
  <g fill="#050505">
    <rect x="15.7" y="11.2" width="7.7" height="4.2" rx="1" transform="rotate(31 15.7 11.2)"/>
    <rect x="8.8" y="18.6" width="8.3" height="4.5" rx="1" transform="rotate(16 8.8 18.6)"/>
    <rect x="5.8" y="29.7" width="8.5" height="4.6" rx="1"/>
    <rect x="8.8" y="40.2" width="8.3" height="4.5" rx="1" transform="rotate(-16 8.8 40.2)"/>
    <rect x="15.7" y="49.6" width="7.7" height="4.2" rx="1" transform="rotate(-31 15.7 49.6)"/>
  </g>
</svg>
